# Firebase App Hosting configuration for the Next.js app.
# Secret values such as RUNWARE_API_KEY and DATABASE_URL should be configured
# in the Firebase App Hosting console or Cloud Secret Manager, not committed here.
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 10
  cpu: 2
  memoryMiB: 4096

env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://wallpackai-web--wallpackai.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDg8c0MzZwe4c-nyDTzXWaR4kyksUZz3_E
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: wallpackai.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: wallpackai
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: wallpackai.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "352267033614"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:352267033614:web:96670cd407b5092682305f"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-E5YGTBFC04
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: wallpackai
    availability:
      - BUILD
      - RUNTIME

  - variable: IMAGE_PROVIDER
    value: runware
    availability:
      - BUILD
      - RUNTIME

  - variable: UPSCALE_PROVIDER
    value: none
    availability:
      - BUILD
      - RUNTIME

  - variable: RUNWARE_AIR_ID
    value: openai:gpt-image@2
    availability:
      - BUILD
      - RUNTIME

  - variable: RUNWARE_API_URL
    value: https://api.runware.ai/v1
    availability:
      - BUILD
      - RUNTIME

  - variable: RUNWARE_API_KEY
    secret: RUNWARE_API_KEY
    availability:
      - RUNTIME

  - variable: DISABLE_GENERATION
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  - variable: STORAGE_PROVIDER
    value: firebase
    availability:
      - BUILD
      - RUNTIME

  - variable: EXPORT_SIGNED_URL_TTL_SECONDS
    value: "900"
    availability:
      - BUILD
      - RUNTIME

  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME

  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_STARTER_ID
    secret: STRIPE_PRICE_STARTER_ID
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_STUDIO_ID
    secret: STRIPE_PRICE_STUDIO_ID
    availability:
      - RUNTIME

  - variable: STRIPE_PRICE_BATCH_ID
    secret: STRIPE_PRICE_BATCH_ID
    availability:
      - RUNTIME
